<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login Moderna</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="logo">
            <h2>Sua Logo</h2>
        </div>
        
        <form id="loginForm" class="login-form">
            <h3>Login</h3>
            
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seuusuario@email.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Sua senha" required>
                    <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>
            </div>
            
            <div class="forgot-password">
                <a href="#">Esqueceu a senha?</a>
            </div>
            
            <button type="submit" class="btn-signin">Entrar</button>
            
            <div class="divider">
                <span>ou continue com</span>
            </div>
            
            <div class="social-login">
                <button type="button" class="social-btn"><i class="fa-brands fa-google"></i></button>
                <button type="button" class="social-btn"><i class="fa-brands fa-github"></i></button>
                <button type="button" class="social-btn"><i class="fa-brands fa-facebook"></i></button>
            </div>
            
            <div class="register-link">
                Não tem uma conta? <a href="#">Registre-se grátis</a>
            </div>
        </form>
    </div>

    <script src="./login.js"></script>
</body>
</html>
